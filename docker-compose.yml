services:
  postgres:
    image: postgres:15-alpine
    container_name: dpa-tricore-postgres
    environment:
      POSTGRES_DB: dpa_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5up3r53cr3t
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpa-network

networks:
  dpa-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
